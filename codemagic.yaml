workflows:
  android-workflow:
    name: Android Release
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - Thailingo
    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Set up keystore
        script: |
          echo $KEYSTORE_FILE | base64 --decode > thailingo-release.jks
          echo "storePassword=$KEYSTORE_PASSWORD" > android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "storeFile=../../thailingo-release.jks" >> android/key.properties

      - name: Install Shorebird and Build
        script: |
          curl --proto '=https' --tlsv1.2 https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh -sSf | bash
          export PATH="$PATH:$HOME/.shorebird/bin"
          shorebird --version
          echo $SHOREBIRD_TOKEN | shorebird login:ci --token $SHOREBIRD_TOKEN || true
          SHOREBIRD_TOKEN=$SHOREBIRD_TOKEN shorebird build apk --release

      - name: Publish to Firebase App Distribution
        script: |
          echo $FIREBASE_SERVICE_ACCOUNT | base64 --decode > firebase-service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/firebase-service-account.json
          firebase appdistribution:distribute \
            build/app/outputs/flutter-apk/app-release.apk \
            --app $FIREBASE_APP_ID \
            --groups Testers \
            --release-notes "New build with OTA updates enabled"

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
